name: tingtongapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  mobile_scanner: ^5.2.3
  sqflite: ^2.3.3+1
  path: ^1.9.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  http: ^1.6.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  crypto: ^3.0.7
  sqflite_common_ffi: ^2.4.0+2
  share_plus: ^7.2.1
  pdf: ^3.10.8
  printing: ^5.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
  web:
    generate: true
  image_path: "assets/images/warungkas-logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/warungkas-logo.png"
